apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: ondemand
spec:
  version: v0.0.0
  homepage: https://github.com/ssoriche/kubectl-ondemand
  shortDescription: Analyze why Karpenter nodes are on-demand
  description: |
    Analyzes on-demand nodes managed by Karpenter and classifies why
    each node and its workloads are running on on-demand capacity instead
    of spot. Identifies requested, spot-fallback, and inherited cases,
    and highlights misconfigured workloads that could run on spot.

    Features:
    - Classifies on-demand nodes as requested, spot-fallback, or inherited
    - Shows per-pod analysis of why workloads are on on-demand nodes
    - Detects misconfigured workloads that could run on spot
    - Calculates spot-capable percentage per node
    - Configurable spot taint validation
    - Automatically detects Karpenter API version (v1alpha5, v1beta1, v1)
    - Supports table, JSON, and YAML output formats
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/ssoriche/kubectl-ondemand/releases/download/v0.0.0/kubectl-ondemand_linux_amd64.tar.gz
      sha256: "PLACEHOLDER"
      bin: kubectl-ondemand
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/ssoriche/kubectl-ondemand/releases/download/v0.0.0/kubectl-ondemand_linux_arm64.tar.gz
      sha256: "PLACEHOLDER"
      bin: kubectl-ondemand
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/ssoriche/kubectl-ondemand/releases/download/v0.0.0/kubectl-ondemand_darwin_amd64.tar.gz
      sha256: "PLACEHOLDER"
      bin: kubectl-ondemand
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/ssoriche/kubectl-ondemand/releases/download/v0.0.0/kubectl-ondemand_darwin_arm64.tar.gz
      sha256: "PLACEHOLDER"
      bin: kubectl-ondemand
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/ssoriche/kubectl-ondemand/releases/download/v0.0.0/kubectl-ondemand_windows_amd64.zip
      sha256: "PLACEHOLDER"
      bin: kubectl-ondemand.exe
